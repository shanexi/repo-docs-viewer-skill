<script>
  (() => {
    const mode = localStorage.getItem("docs-viewer:theme") || "system";
    const dark = mode === "dark" || (mode === "system" && matchMedia("(prefers-color-scheme: dark)").matches);
    document.documentElement.dataset.theme = dark ? "dark" : "light";
    document.documentElement.dataset.themeMode = mode;
  })();
</script>

  :root,
  html[data-theme="light"] {
    color-scheme: light;
    --bg: #fff;
    --surface: #fff;
    --surface-soft: #faf9f5;
    --surface-muted: #f0eee5;
    --surface-active: #e9e5d8;
    --surface-tint: #faf6f0;
    --text: #1f2328;
    --text-soft: #56554e;
    --text-muted: #8e8d86;
    --text-faint: #9b9a92;
    --border: #e8e6df;
    --border-strong: #d9d8d3;
    --border-soft: rgba(0,0,0,.1);
    --accent: #d97757;
    --accent-strong: #c96644;
    --accent-soft: rgba(217,119,87,.16);
    --accent-border: #e3a886;
    --badge: #b08968;
    --shadow: rgba(0,0,0,.14);
    --overlay: rgba(20,19,17,.82);
    --overlay-strong: rgba(20,19,17,.9);
    --scrim: rgba(20,19,17,.28);
    --canvas-dark: #111;
    --success: #2f7d4b;
    --success-bg: #edf7ef;
    --success-border: #cfe8d6;
  }

  html[data-theme="dark"] {
    color-scheme: dark;
    --bg: #161718;
    --surface: #1c1d1f;
    --surface-soft: #202123;
    --surface-muted: #2a2b2d;
    --surface-active: #34302a;
    --surface-tint: #2a241f;
    --text: #e7e7e2;
    --text-soft: #c9c7bf;
    --text-muted: #9f9b90;
    --text-faint: #87837a;
    --border: #333437;
    --border-strong: #494a4d;
    --border-soft: rgba(255,255,255,.11);
    --accent: #e08a67;

  function splitObsidianTarget(value) {
    const parts = value.split("|").map((part) => part.trim());
    const target = parts.shift() ?? "";
    return { target, meta: parts.join("|") };
  }

  function imageProps(meta) {
    const props = { className: ["obsidian-embed"], loading: "lazy" };
    if (/^\d+$/.test(meta)) props.width = meta;
    const size = meta.match(/^(\d+)x(\d+)$/i);
    if (size) {
      props.width = size[1];
      props.height = size[2];
    }
    return props;
  }

  function remarkObsidianSyntax() {
    return (tree) => {
      function visit(parent) {
        if (!parent.children) return;
        for (let i = 0; i < parent.children.length; i++) {
          const node = parent.children[i];
          if (node.type !== "text") {
            visit(node);
            continue;
          }
          const value = node.value;
          const re = /!\[\[([^\]\n]+)\]\]|==([^=\n]+?)==/g;
          let match;
          let last = 0;
          const next = [];
          while ((match = re.exec(value))) {
            if (match.index > last) next.push({ type: "text", value: value.slice(last, match.index) });
            if (match[1]) {
              const { target, meta } = splitObsidianTarget(match[1]);
              if (IMAGE_EXT_RE.test(target)) {
                next.push({
                  type: "image",
                  url: assetUrl(target),
                  alt: meta || target,
                  data: { hProperties: imageProps(meta) },
                });
              } else {
                next.push({ type: "text", value: match[0] });
              }
            } else {
              next.push({
                type: "emphasis",
                data: { hName: "mark" },
                children: [{ type: "text", value: match[2] }],
              });
            }
            last = match.index + match[0].length;
          }
          if (!next.length) continue;
          if (last < value.length) next.push({ type: "text", value: value.slice(last) });
          parent.children.splice(i, 1, ...next);
          i += next.length - 1;
        }
      }
      visit(tree);
    };
  }

  function applyImageTransform() {

  function fitImage() {
    const r = imgStage.getBoundingClientRect();

    const h = imgFull.naturalHeight || imgFull.height || 1;
    imgState.fitScale = Math.min((r.width - 48) / w, (r.height - 72) / h, 1);
    imgState.scale = Math.max(0.05, imgState.fitScale);
    imgState.x = (r.width - w * imgState.scale) / 2;
    imgState.y = (r.height - h * imgState.scale) / 2;
    applyImageTransform();

  function openImage(img) {

    const nextScale = Math.max(imgState.fitScale * 0.5, Math.min(8, oldScale * factor));
    const ratio = nextScale / oldScale;
    imgState.x = px - (px - imgState.x) * ratio;
    imgState.y = py - (py - imgState.y) * ratio;
    imgState.scale = nextScale;
    applyImageTransform();
  }

    const dx = b.x - a.x;
    const dy = b.y - a.y;
    return {
      dist: Math.max(1, Math.hypot(dx, dy)),
      x: (a.x + b.x) / 2,
      y: (a.y + b.y) / 2,
    };
  }

  function buildTree(list) {
    const rootNode = { dirs: new Map(), files: [] };
    for (const { path } of list) {
      const parts = path.split("/");
      let node = rootNode;
      let acc = "";
      for (const part of parts.slice(0, -1)) {
        acc = acc ? `${acc}/${part}` : part;
        if (!node.dirs.has(part)) node.dirs.set(part, { dirs: new Map(), files: [], full: acc });
        node = node.dirs.get(part);
      }
      node.files.push(path);

    return rootNode;

  function rowHtml(path, depth, { fullLabel = false } = {}) {
    const label = fullLabel || !path.includes("/") ? path : path.slice(path.lastIndexOf("/") + 1);

        ${dirRowHtml(child.full, name, depth)}
        <div class="kids">${treeHtml(child, depth + 1)}</div></div>`)
      .join("");
    const files = node.files.sort().map((f) => rowHtml(f, depth)).join("");
    return dirs + files;

    const star = e.target.closest(".star");
    if (star) {
      e.stopPropagation();
      const path = star.closest(".t-row").dataset.path;
      if (pins.has(path)) {
        pins.delete(path);
        // 清掉该置顶目录及其后代的展开记忆
        for (const d of [...pinOpenDirs]) {
          if (d === path || d.startsWith(path + "/")) pinOpenDirs.delete(d);
        }
      } else {
        pins.add(path);
        if (findDirNode(path)) pinOpenDirs.add(path); // 新置顶的目录默认展开
      }
      localStorage.setItem(PIN_KEY, JSON.stringify([...pins]));
      localStorage.setItem(PIN_OPEN_KEY, JSON.stringify([...pinOpenDirs]));
      renderPins();
      return;
    }
    const fileRow = e.target.closest(".t-file");
    if (fileRow) {
      saveDocScroll();
      location.href = `/d/${encodeURI(fileRow.dataset.path)}`;
      return;
    }
    const dirRow = e.target.closest(".t-dir > .t-row");
    if (dirRow) {
      const dir = dirRow.parentElement.dataset.dir;
      const inPins = !!dirRow.closest("#pins");
      const set = inPins ? pinOpenDirs : openDirs;
      if (set.has(dir)) { set.delete(dir); } else { set.add(dir); }
      localStorage.setItem(inPins ? PIN_OPEN_KEY : OPEN_KEY, JSON.stringify([...set]));
      applyOpenState();

  pinPeek.addEventListener("click", (e) => {
    const fileRow = e.target.closest(".t-file");
    if (fileRow) {
      saveDocScroll();
      location.href = `/d/${encodeURI(fileRow.dataset.path)}`;
      return;
    }
    const row = e.target.closest(".t-row");
    if (row?.dataset.path && findDirNode(row.dataset.path)) {
      app.classList.remove("no-side");
      localStorage.setItem(SIDE_KEY, "1");
      pinPeek.classList.remove("show");
    }
  });

  applyOpenState();
  renderPins();
  // 定位当前文档：优先置顶区的副本（在顶部，不把侧边栏滚到主树深处）
  (document.querySelector("#pins .t-row.active") ?? treeEl.querySelector(".t-row.active"))
    ?.scrollIntoView({ block: "center" });

  const PANELS = { files: "panel-files", outline: "panel-outline", comments: "panel-comments" };
  function setSideTab(name, { persist = true, render = true } = {}) {
    const next = PANELS[name] ? name : "files";
    for (const tab of document.querySelectorAll(".stab")) tab.classList.toggle("on", tab.dataset.tab === next);
    for (const [panelName, id] of Object.entries(PANELS)) {
      document.getElementById(id).style.display = panelName === next ? "" : "none";
    }
    if (persist) localStorage.setItem(TAB_KEY, next);
    if (render && next === "comments") renderComments();
  }

  for (const tab of document.querySelectorAll(".stab")) {
    tab.addEventListener("click", () => setSideTab(tab.dataset.tab));
  }

  let recogito = null;
  let persistFn = null;
  let annotationCache = [];
  let boxAnnotations = [];  // mermaid 框选评论（独立于 Recogito 文本批注，合并持久化）
  setSideTab(localStorage.getItem(TAB_KEY) ?? "files", { persist: false, render: false });
  const isBoxAnno = (a) => ((a?.target?.selector) ?? []).some((s) => s?.type === "MermaidBoxSelector");
  const boxSelOf = (a) => ((a?.target?.selector) ?? []).find((s) => s?.type === "MermaidBoxSelector") ?? {};
  function renderBoxMarkers() {
    const content = document.getElementById("content");
    if (!content) return;
    content.querySelectorAll(".mermaid").forEach((holder) => {
      const idx = Number(holder.dataset.diagramIndex);
      const n = boxAnnotations.filter((a) => (boxSelOf(a).diagramIndex ?? -1) === idx).length;
      let badge = holder.querySelector(".mm-box-badge");
      if (n > 0) {
        if (!badge) {
          badge = document.createElement("button");
          badge.className = "mm-box-badge";
          badge.title = t("showDiagramComments");
          badge.addEventListener("click", (e) => { e.stopPropagation(); const svg = holder.querySelector("svg"); if (svg) { window.__openDiagram?.(svg); window.__showDiaComments?.(idx); } });
          holder.appendChild(badge);
        }
        badge.textContent = `💬 ${n}`;
      } else if (badge) { badge.remove(); }
    });
  }

  function quoteOf(a) {
    const sel = a?.target?.selector ?? [];
    return (Array.isArray(sel) ? sel : [sel]).find((s) => s?.type === "TextQuoteSelector")?.exact ?? "";
  }

  function bodyOf(a) {
    return (a?.body ?? []).map((b) => b.value).filter(Boolean).join("\n");
  }

  function commentDocTop(it) {
    const mermaidEls = document.querySelectorAll("#content .mermaid");
    const el = it.box
      ? mermaidEls[boxSelOf(it.a).diagramIndex ?? -1]
      : document.querySelector(`.r6o-annotation[data-id="${CSS.escape(it.a.id)}"]`);
    return el ? el.getBoundingClientRect().top + window.scrollY : Number.MAX_SAFE_INTEGER;
  }

  function collectCommentItems() {
    const textItems = recogito ? recogito.getAnnotations() : [];
    const byId = new Map();
    for (const a of annotationCache) byId.set(a.id, a);
    for (const a of textItems) byId.set(a.id, a);
    for (const a of boxAnnotations) byId.set(a.id, a);
    return itemsFromAnnotations([...byId.values()]);
  }

  function itemsFromAnnotations(annotations) {
    return (annotations ?? [])
      .map((a, index) => ({ a, box: isBoxAnno(a), index }))
      .sort((a, b) => (commentDocTop(a) - commentDocTop(b)) || (a.index - b.index));
  }

  async function currentCommentItemsForCopy() {
    if (!docName) return [];
    try {
      const state = await (await fetch(`/api/annotations/${encodeURI(docName)}`)).json();
      if (Array.isArray(state.annotations)) return itemsFromAnnotations(state.annotations);
    } catch (err) {
      console.error("annotation export read failed", err);
    }
    return collectCommentItems();
  }

  function mdBlockquote(value) {
    const text = (value || `（${t("noExcerpt")}）`).trim();
    return text.split(/\r?\n/).map((line) => `> ${line || " "}`).join("\n");
  }

  function commentsMarkdown(items) {
    const title = docName || t("chooseDoc");
    if (!items.length) return `# ${title} ${t("comments")}\n\n${t("noDocComments")}。\n`;
    return [
      `# ${title} 的评论`,
      "",
      ...items.flatMap((it, i) => {
        const type = it.box ? `${t("diagramBoxLabel")} ${t("comments")}` : t("comments");
        const quote = it.box ? (boxSelOf(it.a).extractedText || `（${t("noText")}）`) : quoteOf(it.a);
        const comment = bodyOf(it.a).trim() || `（${t("empty")}）`;
        return [
          `## ${i + 1}. ${type}`,
          "",
          mdBlockquote(quote),
          "",
          comment,
          "",
        ];
      }),
    ].join("\n").replace(/\n{3,}/g, "\n\n").trimEnd() + "\n";
  }

  async function copyText(text) {
    if (navigator.clipboard?.writeText) {
      try {
        await navigator.clipboard.writeText(text);
        return;
      } catch {}
    }
    const ta = document.createElement("textarea");
    ta.value = text;
    ta.style.position = "fixed";
    ta.style.left = "-9999px";
    document.body.appendChild(ta);
    ta.focus();
    ta.select();
    document.execCommand("copy");
    ta.remove();
  }

  // 实时刷新文件树里某文档的批注数 badge（加载时的 /api/tree 只是快照，
  // 加/删批注后用此函数同步，主树 + 置顶区的同名行都更新）
  function refreshBadge(path, count) {
    countByPath.set(path, count);
    for (const row of document.querySelectorAll(`.t-file[data-path="${CSS.escape(path)}"]`)) {
      let badge = row.querySelector(".badge");
      if (count) {
        if (!badge) {
          badge = document.createElement("span");
          badge.className = "badge";
          row.insertBefore(badge, row.querySelector(".star"));
        }
        badge.textContent = `💬${count}`;
      } else if (badge) {
        badge.remove();
      }
    }
  }

  function renderComments() {
    const listEl = document.getElementById("comments-list");
    // 侧栏评论顺序 = 文中位置：box 取第 N 个 mermaid holder（不依赖 data 属性的设置时机）、
    // text 取已渲染的 annotation 元素；按在文档里的垂直位置排序。
    const items = collectCommentItems();
    const copyBtn = document.getElementById("copy-comments-md");
    const copyStatus = document.getElementById("copy-comments-status");
    copyBtn.disabled = !docName || !items.length;
    if (!items.length) copyStatus.textContent = "";
    document.getElementById("cmt-count").textContent = items.length || "";
    if (docName) refreshBadge(docName, items.length);
    renderBoxMarkers();
    if (!items.length) {
      listEl.innerHTML = `<div class="cmt-empty">${docName ? t("noDocComments") : t("chooseDocComments")}</div>`;
      return;
    }
    listEl.innerHTML = items.map((it, i) => {
      const comment = bodyOf(it.a);
      const q = it.box ? `▢ ${t("diagramBoxLabel")}：${boxSelOf(it.a).extractedText || `（${t("noText")}）`}` : quoteOf(it.a);
      return `<div class="cmt${it.box ? " cmt-box" : ""}" data-i="${i}"><div class="q">${q}</div><div class="c">${comment}</div></div>`;
    }).join("");
    listEl.onclick = (e) => {
      const card = e.target.closest(".cmt");
      if (!card) return;
      const it = items[Number(card.dataset.i)];
      if (!it) return;
      if (it.box) {
        const di = boxSelOf(it.a).diagramIndex ?? 0;
        document.querySelector(`.mermaid[data-diagram-index="${di}"]`)?.scrollIntoView({ block: "center", behavior: "smooth" });
      } else {
        document.querySelector(`.r6o-annotation[data-id="${CSS.escape(it.a.id)}"]`)?.scrollIntoView({ block: "center", behavior: "smooth" });
      }
    };
  }

  document.getElementById("copy-comments-md").addEventListener("click", async () => {
    const status = document.getElementById("copy-comments-status");
    try {
      const items = await currentCommentItemsForCopy();
      const md = commentsMarkdown(items);
      window.__lastCommentsMarkdown = md;
      await copyText(md);
      status.textContent = t("copiedComments", { count: items.length });
      setTimeout(() => { if (status.textContent === t("copiedComments", { count: items.length })) status.textContent = ""; }, 1800);
    } catch (err) {
      status.textContent = t("copyFailed");
      console.error(err);
    }
  });

  const contentEl = document.getElementById("content");

  // 字号统一缩放：覆盖 .markdown-body 根 font-size（内部标题/代码均为 em 相对值，整体等比）
  const ZOOM_KEY = "docs-viewer:zoom";
  let zoom = Number(localStorage.getItem(ZOOM_KEY)) || 1;
  function applyZoom(next) {
    zoom = Math.round(Math.min(2, Math.max(0.6, next)) * 10) / 10;
    contentEl.style.fontSize = zoom === 1 ? "" : `${16 * zoom}px`;
    // 评论弹窗 textarea 等随动（CSS 内 calc(14px * var(--zoom))）
    document.getElementById("main").style.setProperty("--zoom", String(zoom));
    document.getElementById("zoom-pct").textContent = `${Math.round(zoom * 100)}%`;
    if (zoom === 1) localStorage.removeItem(ZOOM_KEY); else localStorage.setItem(ZOOM_KEY, String(zoom));
  }
  document.getElementById("zoom-in").addEventListener("click", () => applyZoom(zoom + 0.1));
  document.getElementById("zoom-out").addEventListener("click", () => applyZoom(zoom - 0.1));
  document.getElementById("zoom-pct").addEventListener("click", () => applyZoom(1));
  applyZoom(zoom);

  // —— Cmd/Ctrl+F 页内查找：CSS Custom Highlight API（零 DOM 改动，不干扰划线/图表）——
  const findBar = document.getElementById("find-bar");
  const findInput = findBar.querySelector("input");
  const findCount = document.getElementById("find-count");
  let findRanges = [];
  let findIdx = -1;

  function collectMatches(query) {
    const q = query.toLowerCase();
    if (!q) return [];
    // 拼全文 + 记录每个文本节点的偏移区间；跨块元素插 \n 隔断（与浏览器一致：短语可跨行内标签，不跨段落）
    const walker = document.createTreeWalker(contentEl, NodeFilter.SHOW_TEXT, {
      acceptNode: (n) => n.parentElement?.closest("script,style")
        ? NodeFilter.FILTER_REJECT : NodeFilter.FILTER_ACCEPT,
    });
    const nodes = [];
    let buf = "";
    let lastBlock = null;
    while (walker.nextNode()) {
      const n = walker.currentNode;
      const block = n.parentElement.closest("p,li,h1,h2,h3,h4,h5,h6,td,th,pre,blockquote") ?? n.parentElement;
      if (lastBlock && block !== lastBlock) buf += "\n";
      lastBlock = block;
      nodes.push({ node: n, start: buf.length, end: buf.length + n.data.length });
      buf += n.data;
    }
    const hay = buf.toLowerCase();
    const ranges = [];
    let i = hay.indexOf(q);
    let ni = 0;
    while (i !== -1) {
      const s = i, e = i + q.length;
      while (ni < nodes.length && nodes[ni].end <= s) ni++;
      let ei = ni;
      while (ei < nodes.length && nodes[ei].end < e) ei++;
      if (ni < nodes.length && ei < nodes.length) {
        const r = new Range();
        r.setStart(nodes[ni].node, s - nodes[ni].start);
        r.setEnd(nodes[ei].node, e - nodes[ei].start);
        ranges.push(r);
      }
      i = hay.indexOf(q, i + q.length);
    }
    return ranges;
  }

  function paintFind() {
    if ("highlights" in CSS) {
      CSS.highlights.delete("find-all");
      CSS.highlights.delete("find-current");
      if (findRanges.length) {
        CSS.highlights.set("find-all", new Highlight(...findRanges));
        if (findIdx >= 0) CSS.highlights.set("find-current", new Highlight(findRanges[findIdx]));
      }
    }
    findCount.textContent = findInput.value ? `${findRanges.length ? findIdx + 1 : 0}/${findRanges.length}` : "";
    findCount.classList.toggle("none", !!findInput.value && !findRanges.length);
  }

  function topbarOffset() {
    return (document.querySelector(".topbar")?.getBoundingClientRect().height ?? 0) + 12;
  }

  function scrollMainToElement(el, { behavior = "smooth" } = {}) {
    if (!el) return;
    const mainRect = mainEl.getBoundingClientRect();
    const rect = el.getBoundingClientRect();
    mainEl.scrollBy({ top: rect.top - mainRect.top - topbarOffset(), behavior });
  }

  function scrollToCurrent() {
    if (findIdx < 0) return;
    const mainEl = document.getElementById("main");
    const rect = findRanges[findIdx].getBoundingClientRect();
    mainEl.scrollBy({ top: rect.top - mainEl.getBoundingClientRect().top - mainEl.clientHeight / 2 });
  }

  function runFind() {
    findRanges = collectMatches(findInput.value);
    findIdx = findRanges.length ? 0 : -1;
    paintFind();
    scrollToCurrent();
  }

  function findGo(delta) {
    if (!findRanges.length) return;
    findIdx = (findIdx + delta + findRanges.length) % findRanges.length;
    paintFind();
    scrollToCurrent();
  }

  function openFind() {
    findBar.style.display = "flex";
    const sel = window.getSelection()?.toString().trim();
    if (sel) findInput.value = sel; // 浏览器行为：预填选中文字
    findInput.focus();
    findInput.select();
    if (findInput.value) runFind();
  }

  function closeFind() {
    findBar.style.display = "none";
    findRanges = [];
    findIdx = -1;
    if ("highlights" in CSS) {
      CSS.highlights.delete("find-all");
      CSS.highlights.delete("find-current");
    }
  }

  findInput.addEventListener("input", runFind);
  findInput.addEventListener("keydown", (e) => {
    if (e.key === "Enter") { e.preventDefault(); findGo(e.shiftKey ? -1 : 1); }
    if (e.key === "Escape") { e.stopPropagation(); closeFind(); }
  });
  document.getElementById("find-next").addEventListener("click", () => findGo(1));
  document.getElementById("find-prev").addEventListener("click", () => findGo(-1));
  document.getElementById("find-close").addEventListener("click", closeFind);
  document.addEventListener("keydown", (e) => {
    if ((e.metaKey || e.ctrlKey) && e.key.toLowerCase() === "f") { e.preventDefault(); openFind(); return; }
    if ((e.metaKey || e.ctrlKey) && e.key.toLowerCase() === "g" && findBar.style.display === "flex") {
      e.preventDefault();
      findGo(e.shiftKey ? -1 : 1);
      return;
    }
    // 全局 Esc 关闭查找条；图表/批注弹窗打开时让位（由既有 handler 先关它们）
    if (e.key === "Escape" && findBar.style.display === "flex"
      && !document.getElementById("dia-overlay").classList.contains("show")
      && document.getElementById("anno-pop").style.display !== "block") {
      closeFind();
    }
  });

  if (!docName) {
    app.classList.remove("has-outline");
    hideOutlinePeek();
    document.getElementById("outline-peek-list").innerHTML = "";
    outlinePeekTrigger.innerHTML = "";
    syncOutlineActiveNow = () => {};
    syncOutlinePeekPosition = () => {};
    renderComments();
    contentEl.innerHTML = `<p style="color:var(--text-faint)">${t("homeCopy")}</p>`;
  } else {
    document.getElementById("docname").textContent = docName;
    document.title = docName;

    const [{ unified }, remarkParse, remarkGfm, remarkRehype, rehypeStringify, mermaidMod, recogitoMod] = await Promise.all([
      import("https://esm.sh/unified@11"),
      import("https://esm.sh/remark-parse@11"),
      import("https://esm.sh/remark-gfm@4"),
      import("https://esm.sh/remark-rehype@11"),
      import("https://esm.sh/rehype-stringify@10"),
      import("https://esm.sh/mermaid@11"),
      import("https://esm.sh/@recogito/recogito-js@1.8.4"),
    ]);
    const mermaid = mermaidMod.default;
    const initRecogito = window.Recogito?.init ?? recogitoMod.init ?? recogitoMod.default?.init ?? recogitoMod.Recogito?.init;

    const md = await (await fetch(`/raw/${encodeURI(docName)}`)).text();
    const html = String(
      await unified()
        .use(remarkParse.default)
        .use(remarkGfm.default)
        .use(remarkObsidianSyntax)
        .use(remarkRehype.default)
        .use(rehypeStringify.default)
        .process(md),
    );
    contentEl.innerHTML = html;
    normalizeImages(contentEl);

    // —— 大纲（从渲染后的标题生成，点击跳转 + 滚动高亮当前位置）——
    const outlineEl = document.getElementById("outline-list");
    const outlinePeekList = document.getElementById("outline-peek-list");
    const headings = [...contentEl.querySelectorAll("h1,h2,h3,h4,h5,h6")];
    headings.forEach((h, i) => { if (!h.id) h.id = `h-${i}`; });
    if (!headings.length) {
      app.classList.remove("has-outline");
      hideOutlinePeek();
      outlineEl.innerHTML = `<div class="ol-empty">${t("noHeadings")}</div>`;
      outlinePeekList.innerHTML = `<div class="ol-empty">${t("noHeadings")}</div>`;
      outlinePeekTrigger.innerHTML = "";
      syncOutlineActiveNow = () => {};
      syncOutlinePeekPosition = () => {};
    } else {
      app.classList.add("has-outline");
      const minLevel = Math.min(...headings.map((h) => Number(h.tagName[1])));
      const escapeHtml = (value) => String(value).replace(/[&<>"']/g, (ch) => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;",
        "'": "&#39;",
      }[ch]));
      const outlineHtml = headings.map((h, i) => {
        const level = Number(h.tagName[1]);
        const text = escapeHtml(h.textContent.trim());
        return `<div class="ol-item ol-h${level}" data-i="${i}" style="padding-left:${12 + (level - minLevel) * 13}px" title="${text}">${text}</div>`;
      }).join("");
      const miniHtml = headings.map((h, i) => {
        const text = escapeHtml(h.textContent.trim());
        return `<span class="outline-mini-mark" data-i="${i}" title="${text}"></span>`;
      }).join("");
      outlineEl.innerHTML = outlineHtml;
      outlinePeekList.innerHTML = outlineHtml;
      outlinePeekTrigger.innerHTML = miniHtml;
      const handleOutlineClick = (e, { closePeek = false } = {}) => {
        const item = e.target.closest(".ol-item");
        if (!item) return;
        scrollMainToElement(headings[Number(item.dataset.i)]);
        if (closePeek) {
          hideOutlinePeek();
          outlinePeekTrigger.blur();
        }
      };
      outlineEl.onclick = handleOutlineClick;
      outlinePeekList.addEventListener("click", (e) => handleOutlineClick(e, { closePeek: true }), { capture: true });
      const mainEl = document.getElementById("main");
      let activeOutlineIndex = 0;
      const syncMiniOutline = (active) => {
        for (const el of outlinePeekTrigger.children) {
          const on = Number(el.dataset.i) === active;
          el.classList.toggle("active", on);
          if (on) {
            el.style.setProperty("width", "14px", "important");
            el.style.setProperty("background-color", "#2f2e2a", "important");
          } else {
            el.style.removeProperty("width");
            el.style.removeProperty("background-color");
          }
        }
      };
      syncOutlinePeekPosition = () => {
        if (!outlinePeek.classList.contains("show")) return;
        outlinePeekList.querySelector(`[data-i="${activeOutlineIndex}"]`)?.scrollIntoView({ block: "center" });
      };
      let spyScheduled = false;
      const syncOutlineActive = () => {
        const limit = mainEl.getBoundingClientRect().top + 90;
        let active = 0;
        headings.forEach((h, i) => { if (h.getBoundingClientRect().top <= limit) active = i; });
        activeOutlineIndex = active;
        syncMiniOutline(active);
        for (const list of [outlineEl, outlinePeekList]) {
          for (const el of list.children) {
            const on = Number(el.dataset.i) === active;
            el.classList.toggle("active", on);
            if (on && list === outlineEl) el.scrollIntoView({ block: "nearest" });
          }
        }
      };
      syncOutlineActiveNow = syncOutlineActive;
      mainEl.addEventListener("scroll", () => {
        if (spyScheduled) return;
        spyScheduled = true;
        requestAnimationFrame(() => {
          spyScheduled = false;
          syncOutlineActive();
        });
      });
      syncOutlineActive();
    }

    for (const block of contentEl.querySelectorAll("code.language-mermaid")) {
      const pre = block.closest("pre");
      const holder = document.createElement("pre");
      holder.className = "mermaid";
      holder.textContent = block.textContent;
      pre.replaceWith(holder);
    }
    mermaid.initialize({ startOnLoad: false, theme: resolvedTheme() === "dark" ? "dark" : "default", securityLevel: "loose" });
    await mermaid.run({ querySelector: ".mermaid" });
    restoreDocScrollSoon();

    const diaOverlay = document.getElementById("dia-overlay");
    const diaStage = document.getElementById("dia-stage");
    const dia = { svg: null, vb0: null, vb: null, drag: null, diagramIndex: -1, boxMode: false };
    const diaPointers = new Map();
    let diaPinchDist = null;

    function diaSetVb() {
      if (dia.svg) dia.svg.setAttribute("viewBox", `${dia.vb.x} ${dia.vb.y} ${dia.vb.w} ${dia.vb.h}`);
    }
    function diaReset() {
      if (!dia.vb0) return;
      dia.vb = { ...dia.vb0 };
      diaSetVb();
    }
    function diaScale() {
      const r = diaStage.getBoundingClientRect();
      return Math.min(r.width / dia.vb.w, r.height / dia.vb.h);
    }
    function isTextTarget(e) {
      return e.target instanceof Element && !!e.target.closest("text, tspan, foreignObject");
    }
    function zoomDiagramAt(clientX, clientY, factor) {
      if (!dia.svg) return;
      const r = diaStage.getBoundingClientRect();
      const s = diaScale();
      const ox = (r.width - s * dia.vb.w) / 2;
      const oy = (r.height - s * dia.vb.h) / 2;
      const ux = dia.vb.x + (clientX - r.left - ox) / s;
      const uy = dia.vb.y + (clientY - r.top - oy) / s;
      let f = factor;
      const total = (dia.vb0.w / dia.vb.w) * f;
      if (total > 30) f *= 30 / total;
      if (total < 0.15) f *= 0.15 / total;
      dia.vb.w /= f;
      dia.vb.h /= f;
      dia.vb.x = ux - (ux - dia.vb.x) / f;
      dia.vb.y = uy - (uy - dia.vb.y) / f;
      diaSetVb();
    }

    function openDiagram(svg) {
      const clone = svg.cloneNode(true);
      clone.removeAttribute("width");
      clone.style.maxWidth = "none";
      diaStage.innerHTML = "";
      diaStage.appendChild(clone);
      const vbAttr = (clone.getAttribute("viewBox") ?? "").split(/[\s,]+/).map(Number);
      if (vbAttr.length === 4 && vbAttr.every(Number.isFinite)) {
        dia.vb0 = { x: vbAttr[0], y: vbAttr[1], w: vbAttr[2], h: vbAttr[3] };
      } else {
        const box = clone.getBBox();
        dia.vb0 = { x: box.x, y: box.y, w: box.width, h: box.height };
      }
      dia.svg = clone;
      dia.diagramIndex = Number(svg.closest(".mermaid")?.dataset.diagramIndex ?? -1);
      diaReset();
      diaOverlay.classList.add("show");
      syncDiaCommentsVisibility();
    }
    function closeDiagram() {
      diaOverlay.classList.remove("show");
      diaOverlay.classList.remove("with-comments");
      diaOverlay.classList.remove("has-comments");
      diaStage.innerHTML = "";
      dia.svg = null;
      dia.drag = null;
      diaPointers.clear();
      diaPinchDist = null;
    }
    function diaCommentCount(idx = dia.diagramIndex) {
      return boxAnnotations.filter((a) => (boxSelOf(a).diagramIndex ?? -1) === idx).length;
    }
    function updateDiaCommentButton(idx = dia.diagramIndex) {
      const n = diaCommentCount(idx);
      diaOverlay.classList.toggle("has-comments", n > 0);
      const btn = document.getElementById("dia-commentbtn");
      btn.textContent = n > 0 ? `💬 ${n}` : "💬";
    }
    function hideDiaComments() {
      diaOverlay.classList.remove("with-comments");
      updateDiaCommentButton();
    }
    // 全屏态侧栏：展示本图的框选评论（badge 点击 = 先全屏图、再侧边评论）
    function showDiaComments(idx) {
      const list = boxAnnotations.filter((a) => (boxSelOf(a).diagramIndex ?? -1) === idx);
      const commentsEl = document.getElementById("dia-comments");
      commentsEl.innerHTML =
        `<div class="dc-head"><div class="dc-title">${t("diagramComments", { count: list.length })}</div><button class="dc-close" type="button" title="${t("hideComments")}">×</button></div>` + (list.length
          ? list.map((a, i) => `<div class="dc-item" data-i="${i}" title="${t("commentPlaceholder")}"><div class="dc-extract">▢ ${boxSelOf(a).extractedText || `（${t("noText")}）`}</div><div class="dc-body">${bodyOf(a) || `（${t("empty")}）`}</div></div>`).join("")
          : `<div class="dc-empty">${t("noDocComments")}</div>`);
      commentsEl.querySelector(".dc-close")?.addEventListener("click", hideDiaComments);
      for (const item of commentsEl.querySelectorAll(".dc-item")) {
        item.addEventListener("click", () => {
          const a = list[Number(item.dataset.i)];
          if (!a) return;
          const rect = item.getBoundingClientRect();
          openDiaBoxEditor({ kind: "edit", annotation: a }, bodyOf(a), rect);
        });
      }
      diaOverlay.classList.add("with-comments");
      updateDiaCommentButton(idx);
    }
    function syncDiaCommentsVisibility() {
      if (dia.diagramIndex < 0) return;
      updateDiaCommentButton();
      if (diaCommentCount() > 0) {
        showDiaComments(dia.diagramIndex);
      } else {
        diaOverlay.classList.remove("with-comments");
        document.getElementById("dia-comments").innerHTML = "";
      }
    }
    window.__openDiagram = openDiagram;
    window.__showDiaComments = showDiaComments;
    document.getElementById("dia-commentbtn").addEventListener("click", () => {
      if (dia.diagramIndex >= 0) showDiaComments(dia.diagramIndex);
    });
    // 评论栏拖动 resize（改 --dia-cmt-w，左图右评论双栏）
    const diaResizer = document.getElementById("dia-resizer");
    let diaResizing = false;
    diaResizer.addEventListener("mousedown", (e) => { diaResizing = true; diaResizer.classList.add("dragging"); e.preventDefault(); });
    window.addEventListener("mousemove", (e) => {
      if (!diaResizing) return;
      const w = Math.max(220, Math.min(window.innerWidth * 0.6, window.innerWidth - e.clientX));
      diaOverlay.style.setProperty("--dia-cmt-w", `${w}px`);
    });
    window.addEventListener("mouseup", () => { if (diaResizing) { diaResizing = false; diaResizer.classList.remove("dragging"); } });

    diaStage.addEventListener("wheel", (e) => {
      if (!dia.svg) return;
      e.preventDefault();
      // 指数缩放，幅度正比 deltaY；触控板捏合（ctrlKey）高灵敏；viewBox 缩放 = 矢量级清晰
      zoomDiagramAt(e.clientX, e.clientY, Math.exp(-e.deltaY * (e.ctrlKey ? 0.012 : 0.0024)));
    }, { passive: false });

    diaStage.addEventListener("pointerdown", (e) => {
      if (!dia.svg || e.button !== 0) return;
      if (dia.boxMode || isTextTarget(e)) return;
      e.preventDefault();
      window.getSelection()?.removeAllRanges();
      diaPointers.set(e.pointerId, { x: e.clientX, y: e.clientY });
      if (diaPointers.size >= 2) {
        dia.drag = null;
        diaStage.classList.remove("dragging");
        diaPinchDist = pointerPair(diaPointers)?.dist ?? null;
        try { diaStage.setPointerCapture(e.pointerId); } catch {}
        return;
      }
      dia.drag = { px: e.clientX, py: e.clientY, x: dia.vb.x, y: dia.vb.y, s: diaScale() };
      diaStage.classList.add("dragging");
      document.body.style.userSelect = "none";
      try { diaStage.setPointerCapture(e.pointerId); } catch {}
    });
    diaStage.addEventListener("pointermove", (e) => {
      if (diaPointers.has(e.pointerId)) diaPointers.set(e.pointerId, { x: e.clientX, y: e.clientY });
      if (diaPointers.size >= 2) {
        const pair = pointerPair(diaPointers);
        if (pair && diaPinchDist) zoomDiagramAt(pair.x, pair.y, pair.dist / diaPinchDist);
        diaPinchDist = pair?.dist ?? null;
        return;
      }
      if (!dia.drag) return;
      dia.vb.x = dia.drag.x - (e.clientX - dia.drag.px) / dia.drag.s;
      dia.vb.y = dia.drag.y - (e.clientY - dia.drag.py) / dia.drag.s;
      diaSetVb();
    });
    function endDiaPointer(e) {
      diaPointers.delete(e.pointerId);
      if (diaPointers.size < 2) diaPinchDist = null;
      dia.drag = null;
      diaStage.classList.remove("dragging");
      document.body.style.userSelect = "";
    }
    diaStage.addEventListener("pointerup", endDiaPointer);
    diaStage.addEventListener("pointercancel", endDiaPointer);
    diaStage.addEventListener("dblclick", (e) => {
      if (!isTextTarget(e)) diaReset();
    });
    window.__dia = dia;
    document.getElementById("dia-close").addEventListener("click", closeDiagram);
    for (const svg of contentEl.querySelectorAll(".mermaid svg")) {
      svg.addEventListener("click", () => openDiagram(svg));
    }
    window.__closeDiagram = closeDiagram;

    const r = initRecogito({ content: contentEl, disableEditor: true });
    recogito = r;
    window.__recogito = r;

    const pop = document.getElementById("anno-pop");
    const popTa = pop.querySelector("textarea");
    const selTools = document.getElementById("sel-tools");
    const selCopyBtn = document.getElementById("sel-copy");
    const selCommentBtn = document.getElementById("sel-comment");
    let popTarget = null;
    let pendingSelection = null;

    function openPop(anchorRect, value) {
      const mainEl = document.getElementById("main");
      const hostRect = mainEl.getBoundingClientRect();
      pop.style.display = "block";
      const left = Math.max(8, Math.min(anchorRect.left - hostRect.left + mainEl.scrollLeft, mainEl.clientWidth - 356));
      pop.style.left = `${left}px`;
      pop.style.top = `${anchorRect.bottom - hostRect.top + mainEl.scrollTop + 8}px`;
      popTa.value = value;
      popTa.focus();
    }

    function selectedText() {
      return window.getSelection()?.toString().trim() ?? "";
    }

    function selectionTextFromPayload(selection) {
      const sel = selection?.target?.selector ?? selection?.selector ?? [];
      const selectors = Array.isArray(sel) ? sel : [sel];
      return selectors.find((s) => s?.type === "TextQuoteSelector")?.exact?.trim() ?? "";
    }

    function selectionSpanRect() {
      const rects = [...contentEl.querySelectorAll(".r6o-selection")]
        .flatMap((span) => [...span.getClientRects()])
        .filter((r) => r.width && r.height);
      if (!rects.length) return null;
      const left = Math.min(...rects.map((r) => r.left));
      const right = Math.max(...rects.map((r) => r.right));
      const top = Math.min(...rects.map((r) => r.top));
      const bottom = Math.max(...rects.map((r) => r.bottom));
      return { left, right, top, bottom, width: right - left, height: bottom - top };
    }

    function selectionRect() {
      const sel = window.getSelection();
      if (sel?.rangeCount) {
        const range = sel.getRangeAt(0);
        const rect = [...range.getClientRects()].find((r) => r.width && r.height);
        if (rect) return rect;
        const fallback = range.getBoundingClientRect();
        if (fallback.width && fallback.height) return fallback;
      }
      return selectionSpanRect() ?? contentEl.getBoundingClientRect();
    }

    function rangeTextPosition(range) {
      let start = null;
      let end = null;
      let offset = 0;
      const walker = document.createTreeWalker(contentEl, NodeFilter.SHOW_TEXT, {
        acceptNode: (n) => n.parentElement?.closest("script,style")
          ? NodeFilter.FILTER_REJECT : NodeFilter.FILTER_ACCEPT,
      });
      while (walker.nextNode()) {
        const node = walker.currentNode;
        if (node === range.startContainer) start = offset + range.startOffset;
        if (node === range.endContainer) end = offset + range.endOffset;
        offset += node.data.length;
      }
      return Number.isFinite(start) && Number.isFinite(end) && end > start ? { start, end } : null;
    }

    function nativeSelectionPayload() {
      const sel = window.getSelection();
      if (!sel?.rangeCount || sel.isCollapsed) return null;
      const range = sel.getRangeAt(0);
      if (!contentEl.contains(range.commonAncestorContainer)) return null;
      const host = range.commonAncestorContainer.nodeType === 1
        ? range.commonAncestorContainer
        : range.commonAncestorContainer.parentElement;
      if (host?.closest?.(".mermaid, #anno-pop, #sel-tools")) return null;
      const exact = sel.toString().trim();
      if (!exact) return null;
      const pos = rangeTextPosition(range);
      if (!pos) return null;
      return {
        "@context": "http://www.w3.org/ns/anno.jsonld",
        type: "Annotation",
        body: [],
        target: {
          selector: [
            { type: "TextQuoteSelector", exact },
            { type: "TextPositionSelector", start: pos.start, end: pos.end },
          ],
        },
      };
    }

    function showSelectionTools(anchorRect) {
      const mainEl = document.getElementById("main");
      const hostRect = mainEl.getBoundingClientRect();
      selTools.classList.remove("copied");
      selCopyBtn.title = t("copySelection");
      selTools.style.display = "flex";
      selTools.style.visibility = "hidden";
      const toolW = selTools.offsetWidth || 64;
      const toolH = selTools.offsetHeight || 34;
      const minLeft = mainEl.scrollLeft + 8;
      const maxLeft = mainEl.scrollLeft + mainEl.clientWidth - toolW - 8;
      const wantedLeft = anchorRect.left - hostRect.left + mainEl.scrollLeft + anchorRect.width - toolW;
      const left = Math.max(minLeft, Math.min(maxLeft, wantedLeft));
      let top = anchorRect.top - hostRect.top + mainEl.scrollTop - toolH - 8;
      if (top < mainEl.scrollTop + 8) top = anchorRect.bottom - hostRect.top + mainEl.scrollTop + 8;
      selTools.style.left = `${left}px`;
      selTools.style.top = `${top}px`;
      selTools.style.visibility = "";
    }

    function hideSelectionTools() {
      selTools.style.display = "none";
      selTools.style.visibility = "";
      selTools.classList.remove("copied");
      selCopyBtn.title = t("copySelection");
      pendingSelection = null;
    }

    function clearSelectionSpans() {
      for (const span of contentEl.querySelectorAll(".r6o-selection")) {
        span.replaceWith(...span.childNodes);
      }
      contentEl.normalize();
    }
    function clearSelectionState() {
      pendingSelection = null;
      window.getSelection()?.removeAllRanges();
      r.selectAnnotation();
      clearSelectionSpans();
    }
    function dismissSelectionTools() {
      hideSelectionTools();
      clearSelectionState();
    }
    function closePop() {
      pop.style.display = "none";
      popTarget = null;
      hideSelectionTools();
      clearSelectionState();
    }

    function showNativeSelectionTools() {
      if (pop.style.display === "block") return;
      const payload = nativeSelectionPayload();
      if (!payload) return;
      const rect = selectionRect();
      const text = selectionTextFromPayload(payload);
      pendingSelection = { payload, rect, text };
      showSelectionTools(rect);
    }

    r.on("createSelection", (selection) => {
      const an = window.getSelection()?.anchorNode;
      const inMermaid = an && ((an.nodeType === 1 ? an : an.parentElement)?.closest?.(".mermaid"));
      if (inMermaid) { window.getSelection()?.removeAllRanges(); clearSelectionSpans(); return; }  // 图不支持划线，用放大态框选
      requestAnimationFrame(() => {
        const text = selectedText() || selectionTextFromPayload(selection);
        if (!text) return dismissSelectionTools();
        const rect = selectionRect();
        pendingSelection = { payload: selection, rect, text };
        showSelectionTools(rect);
      });
    });

    let nativeSelectionTimer = null;
    function scheduleNativeSelectionTools() {
      clearTimeout(nativeSelectionTimer);
      nativeSelectionTimer = setTimeout(showNativeSelectionTools, 40);
    }
    contentEl.addEventListener("mouseup", scheduleNativeSelectionTools);
    contentEl.addEventListener("keyup", scheduleNativeSelectionTools);
    document.addEventListener("selectionchange", () => {
      if (document.activeElement === popTa) return;
      scheduleNativeSelectionTools();
    });

    r.on("selectAnnotation", (annotation, element) => {
      hideSelectionTools();
      popTarget = { kind: "annotation", payload: annotation };
      const value = (annotation.body ?? []).map((b) => b.value).filter(Boolean).join("\n");
      openPop(element.getBoundingClientRect(), value);
    });

    for (const type of ["pointerdown", "mousedown", "mouseup", "click"]) {
      selTools.addEventListener(type, (e) => {
        e.stopPropagation();
        if (type !== "click") e.preventDefault();
      });
    }
    selCopyBtn.addEventListener("click", async () => {
      const text = pendingSelection?.text || selectedText();
      if (!text) return;
      try {
        await copyText(text);
        selTools.classList.add("copied");
        selCopyBtn.title = t("copied");
        setTimeout(() => {
          selTools.classList.remove("copied");
          selCopyBtn.title = t("copySelection");
        }, 1200);
      } catch (err) {
        console.error("selection copy failed", err);
      }
    });
    selCommentBtn.addEventListener("click", () => {
      const target = pendingSelection;
      if (!target) return;
      hideSelectionTools();
      popTarget = { kind: "selection", payload: target.payload };
      openPop(target.rect, "");
    });

    for (const type of ["pointerdown", "mousedown", "mouseup", "click"]) {
      pop.addEventListener(type, (e) => e.stopPropagation());
    }
    pop.querySelector(".cancel").addEventListener("click", closePop);
    pop.querySelector(".ok").addEventListener("click", async () => {
      if (!popTarget) return closePop();
      const value = popTa.value.trim();
      const body = value ? [{ type: "TextualBody", purpose: "commenting", value }] : [];
      const target = popTarget;
      popTarget = null;
      pop.style.display = "none";
      window.getSelection()?.removeAllRanges();
      r.selectAnnotation();
      clearSelectionSpans();
      if (target.kind === "selection") {
        if (!value) return;
        const annotation = { ...target.payload, id: `#${crypto.randomUUID()}`, type: "Annotation", body };
        r.addAnnotation(annotation);
      } else {
        if (!value) {
          const next = r.getAnnotations().filter((a) => a.id !== target.payload.id);
          await r.setAnnotations(next);
          await persist();
          renderComments();
          return;
        }
        r.addAnnotation({ ...target.payload, body });
      }
      persist();
      renderComments();
    });
    // 点 pop 外（仍在选中态、未写评论）→ 关闭并清掉划线高亮
    document.getElementById("main").addEventListener("mousedown", (e) => {
      if (pop.style.display === "block" && !pop.contains(e.target)) closePop();
      if (selTools.style.display === "flex" && !selTools.contains(e.target)) dismissSelectionTools();
    });
    document.addEventListener("keydown", (e) => {
      if (e.key !== "Escape") return;
      if (document.getElementById("dia-overlay").classList.contains("show")) { window.__closeDiagram?.(); return; }
      if (pop.style.display === "block") closePop();
      if (selTools.style.display === "flex") dismissSelectionTools();
    });

    const annoUrl = `/api/annotations/${encodeURI(docName)}`;
    let annoBase = null; // 服务端批注块的 updatedAt 基准（乐观并发）
    try {
      const saved = await (await fetch(annoUrl)).json();
      annoBase = saved.updatedAt ?? null;
      const allLoaded = saved.annotations ?? [];
      annotationCache = allLoaded;
      boxAnnotations = allLoaded.filter(isBoxAnno);
      try {
        await r.setAnnotations(allLoaded.filter((a) => !isBoxAnno(a)));
      } catch (err) {
        console.error("text annotation anchoring failed", err);
      }
      renderComments();
    } catch (err) {
      console.error("annotation load failed", err);
    }

    async function applyServerState(state) {
      annoBase = state.updatedAt ?? null;
      const allState = state.annotations ?? [];
      annotationCache = allState;
      boxAnnotations = allState.filter(isBoxAnno);
      try {
        await r.setAnnotations(allState.filter((a) => !isBoxAnno(a)));
      } catch (err) {
        console.error("text annotation anchoring failed", err);
      }
      renderComments();
    }

    async function persist() {
      const annotations = [...r.getAnnotations(), ...boxAnnotations];
      const res = await fetch(annoUrl, {
        method: "POST",
        headers: { "content-type": "application/json" },
        body: JSON.stringify({ annotations, baseUpdatedAt: annoBase }),
      });
      if (res.ok) {
        annotationCache = annotations;
        annoBase = (await res.json()).updatedAt ?? null;
        return;
      }
      if (res.status === 409) {
        // Annotation state changed elsewhere. Drop this stale full-list write
        // and re-render from the latest server state.
        await applyServerState(await res.json());
        alert(t("saveConflict"));
        return;
      }
      alert(t("saveFailed"));
    }
    persistFn = persist;

    // Refresh annotations when the page regains focus so external edits appear without reload.
    async function syncFromServer() {
      if (pop.style.display === "block") return; // 正在编辑批注时不打断
      try {
        const cur = await (await fetch(annoUrl)).json();
        if ((cur.updatedAt ?? null) !== annoBase) await applyServerState(cur);
      } catch {}
    }
    window.addEventListener("focus", syncFromServer);
    document.addEventListener("visibilitychange", () => {
      if (!document.hidden) syncFromServer();
    });
    r.on("createAnnotation", () => { persist(); renderComments(); });
    r.on("updateAnnotation", () => { persist(); renderComments(); });
    // There is no delete affordance; do not persist unexpected library-level deletes.
    r.on("deleteAnnotation", () => { renderComments(); });

    // —— mermaid 图框选评论：框选区域 → 提取框内 SVG 文字 → 评论（绕开 SVG 锚定）——
    function extractTextInBox(svg, absBox) {
      const out = [];
      for (const el of svg.querySelectorAll("text, .nodeLabel, foreignObject")) {
        const r2 = el.getBoundingClientRect();
        const cx = (r2.left + r2.right) / 2, cy = (r2.top + r2.bottom) / 2;
        if (cx >= absBox.left && cx <= absBox.right && cy >= absBox.top && cy <= absBox.bottom) {
          const txt = (el.textContent || "").trim().replace(/\s+/g, " ");
          if (txt) out.push(txt);
        }
      }
      return [...new Set(out)].join(" · ");
    }
    contentEl.querySelectorAll(".mermaid").forEach((holder, idx) => {
      holder.style.position = "relative";
      holder.dataset.diagramIndex = String(idx);  // 原图不放框选按钮，保持干净；框选在放大态做
    });
    renderBoxMarkers();

    // —— 放大态（lightbox）框选评论：框选 dia-stage 内 clone svg → 提取框内文字 → 评论 ——
    const diaBoxBtn = document.getElementById("dia-boxbtn");
    const diaBoxRect = document.getElementById("dia-box-rect");
    const diaBoxPop = document.getElementById("dia-box-pop");
    const diaBoxExtract = document.getElementById("dia-box-extract");
    const diaBoxTa = diaBoxPop.querySelector("textarea");
    let diaBoxStart = null, diaBoxTarget = null;
    function exitBoxMode() { dia.boxMode = false; diaBoxBtn.classList.remove("active"); diaStage.classList.remove("boxmode"); diaBoxRect.style.display = "none"; }
    function refreshDiagramCommentViews() {
      renderBoxMarkers();
      renderComments();
      if (diaOverlay.classList.contains("show")) syncDiaCommentsVisibility();
    }
    function openDiaBoxEditor(target, value, anchorRect) {
      const sel = target.annotation ? boxSelOf(target.annotation) : target;
      diaBoxTarget = target;
      diaBoxExtract.textContent = t("boxExtract", { text: sel.extractedText || `（${t("noBoxText")}）` });
      diaBoxTa.value = value ?? "";
      const left = anchorRect?.left ?? 8;
      const bottom = anchorRect?.bottom ?? 8;
      diaBoxPop.style.left = `${Math.max(8, Math.min(left, window.innerWidth - 348))}px`;
      diaBoxPop.style.top = `${Math.max(8, Math.min(bottom + 8, window.innerHeight - 200))}px`;
      diaBoxPop.style.display = "block";
      diaBoxTa.focus();
    }
    diaBoxBtn.addEventListener("click", () => {
      dia.boxMode = !dia.boxMode;
      diaBoxBtn.classList.toggle("active", dia.boxMode);
      diaStage.classList.toggle("boxmode", dia.boxMode);
      diaBoxPop.style.display = "none";
    });
    diaStage.addEventListener("pointerdown", (e) => {
      if (!dia.boxMode || e.button !== 0) return;
      diaBoxStart = { x: e.clientX, y: e.clientY };
      try { diaStage.setPointerCapture(e.pointerId); } catch {}
    });
    diaStage.addEventListener("pointermove", (e) => {
      if (!dia.boxMode || !diaBoxStart) return;
      Object.assign(diaBoxRect.style, {
        left: `${Math.min(diaBoxStart.x, e.clientX)}px`, top: `${Math.min(diaBoxStart.y, e.clientY)}px`,
        width: `${Math.abs(e.clientX - diaBoxStart.x)}px`, height: `${Math.abs(e.clientY - diaBoxStart.y)}px`, display: "block",
      });
    });
    diaStage.addEventListener("pointerup", (e) => {
      if (!dia.boxMode || !diaBoxStart) return;
      const x = Math.min(diaBoxStart.x, e.clientX), y = Math.min(diaBoxStart.y, e.clientY);
      const w = Math.abs(e.clientX - diaBoxStart.x), h = Math.abs(e.clientY - diaBoxStart.y);
      diaBoxStart = null;
      exitBoxMode();
      if (w < 8 || h < 8 || !dia.svg) return;
      const text = extractTextInBox(dia.svg, { left: x, top: y, right: x + w, bottom: y + h });
      openDiaBoxEditor({ kind: "create", diagramIndex: dia.diagramIndex, extractedText: text }, "", { left: x, bottom: y + h });
    });
    for (const ty of ["pointerdown", "mousedown", "click", "wheel"]) diaBoxPop.addEventListener(ty, (ev) => ev.stopPropagation());
    diaBoxPop.querySelector(".cancel").addEventListener("click", () => { diaBoxPop.style.display = "none"; diaBoxTarget = null; });
    diaBoxPop.querySelector(".ok").addEventListener("click", async () => {
      const value = diaBoxTa.value.trim();
      const target = diaBoxTarget;
      diaBoxPop.style.display = "none";
      if (target?.kind === "create" && value) {
        boxAnnotations.push({
          id: `#box-${crypto.randomUUID()}`, type: "Annotation",
          body: [{ type: "TextualBody", purpose: "commenting", value }],
          target: { selector: [{ type: "MermaidBoxSelector", diagramIndex: target.diagramIndex, extractedText: target.extractedText }] },
        });
        await persist();
        refreshDiagramCommentViews();
      } else if (target?.kind === "edit") {
        if (value) {
          target.annotation.body = [{ type: "TextualBody", purpose: "commenting", value }];
        } else {
          boxAnnotations = boxAnnotations.filter((a) => a.id !== target.annotation.id);
        }
        await persist();
        refreshDiagramCommentViews();
      }
      diaBoxTarget = null;
    });
  }
</script>
</body>
